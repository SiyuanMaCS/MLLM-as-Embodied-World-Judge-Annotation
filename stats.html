<style>
/* ===== Ham stats redesign (siyuan 2026-07-02: 好好设计) — self-contained, scoped .hs- ===== */
.hs-wrap{ --hs-gray:#9aa3b2; --hs-gray-d:#6b7280; --hs-blue:#2c5dd9; --hs-blue-d:#1f47a8;
  --hs-track:#eef0f5; --hs-line:#edeef2; }
.hs-card{ background:#fff; border:1px solid var(--border,#e5e5ea); border-radius:16px;
  padding:22px 24px; margin:0 0 20px; box-shadow:0 1px 3px rgba(20,25,40,.05),0 8px 24px -18px rgba(20,25,40,.25); }
.hs-h{ display:flex; align-items:baseline; gap:10px; margin:0 0 2px; }
.hs-h h2{ font-size:19px; font-weight:700; margin:0; letter-spacing:-.01em; }
.hs-h .hs-sub{ color:var(--muted,#666); font-size:12.5px; }
.hs-legend{ display:flex; gap:16px; align-items:center; margin:12px 0 4px; font-size:12.5px; color:var(--muted,#555); }
.hs-legend i{ display:inline-block; width:13px; height:13px; border-radius:4px; margin-right:6px; vertical-align:-2px; }
.hs-sw-all{ background:linear-gradient(180deg,#aab2c0,#8b95a6); }
.hs-sw-self{ background:linear-gradient(180deg,#4f7be6,#2c5dd9); }

/* ---- PA↔IA 2D scatter ---- */
.hs-corr{ margin:12px 0 4px; }
.hs-corr-h{ font-size:12.5px; color:var(--muted,#666); margin:2px 0 8px; }
.hs-scwrap{ display:flex; gap:18px; flex-wrap:wrap; }
.hs-sc{ flex:1 1 260px; min-width:250px; }
.hs-sc-top{ display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
.hs-sc-name{ font-weight:700; font-size:13.5px; }
.hs-sc-name .hs-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:0; }
.hs-sc-name.all .hs-dot{ background:#8b95a6; } .hs-sc-name.self .hs-dot{ background:#2c5dd9; }
.hs-sc-r{ margin-left:auto; font-size:12px; color:var(--muted,#888); }
.hs-sc-r b{ font-size:15px; font-variant-numeric:tabular-nums; }
.hs-sc svg,.hs-sc canvas.hs-heat{ width:100%; height:auto; display:block; border-radius:10px;
  background:linear-gradient(180deg,#fcfdff,#f6f8fc); border:1px solid #eef0f5; }
/* ---- score distribution ---- */
.hs-metric{ margin-top:18px; padding-top:16px; border-top:1px solid var(--hs-line); }
.hs-metric:first-of-type{ border-top:0; padding-top:2px; margin-top:6px; }
.hs-mrow{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
.hs-mname{ font-weight:700; font-size:15px; }
.hs-mfull{ color:var(--muted,#888); font-size:12px; font-weight:500; }
.hs-stats{ display:flex; gap:8px; margin-left:auto; flex-wrap:wrap; }
.hs-pill{ font-size:12px; padding:4px 10px; border-radius:999px; border:1px solid var(--border,#e5e5ea);
  background:#fbfbfd; display:inline-flex; gap:7px; align-items:center; }
.hs-pill b{ font-weight:700; }
.hs-pill .hs-dot{ width:8px; height:8px; border-radius:50%; }
.hs-pill.all .hs-dot{ background:#8b95a6; } .hs-pill.self .hs-dot{ background:#2c5dd9; }
.hs-pill .hs-n{ color:var(--muted,#999); }

.hs-chart{ position:relative; height:184px; margin:6px 0 2px; padding-left:34px; }
.hs-grid{ position:absolute; left:34px; right:0; top:0; bottom:26px; }
.hs-gl{ position:absolute; left:0; right:0; border-top:1px dashed #e9ebf1; }
.hs-gl span{ position:absolute; left:-34px; top:-8px; width:30px; text-align:right;
  font-size:10px; color:#b3b8c4; }
.hs-bars{ position:absolute; left:34px; right:0; top:0; bottom:26px; display:flex; justify-content:space-around; align-items:flex-end; }
.hs-grp{ flex:1; display:flex; justify-content:center; align-items:flex-end; gap:7px; height:100%; }
.hs-bar{ width:34px; border-radius:7px 7px 3px 3px; position:relative; min-height:2px;
  transition:height .55s cubic-bezier(.22,.61,.36,1); box-shadow:0 1px 2px rgba(20,25,40,.14); }
.hs-bar.all{ background:linear-gradient(180deg,#aab2c0,#7f8a9c); }
.hs-bar.self{ background:linear-gradient(180deg,#4f7be6,#2350c9); }
.hs-bar .hs-lab{ position:absolute; top:-17px; left:50%; transform:translateX(-50%);
  font-size:11px; font-weight:700; color:#4a5262; white-space:nowrap; }
.hs-bar.self .hs-lab{ color:#2350c9; }
.hs-bar .hs-cnt{ position:absolute; top:6px; left:50%; transform:translateX(-50%);
  font-size:9.5px; color:#fff; opacity:.85; font-weight:600; }
.hs-xaxis{ position:absolute; left:34px; right:0; bottom:0; height:22px; display:flex; justify-content:space-around; }
.hs-xt{ flex:1; text-align:center; font-size:12px; font-weight:700; color:#555; position:relative; }
.hs-xt .hs-chip{ display:inline-block; width:20px; height:20px; line-height:20px; border-radius:6px; color:#fff; }
.hs-axis-cap{ text-align:center; font-size:11px; color:#b3b8c4; margin-top:-2px; }

/* ---- model leaderboard ---- */
.hs-lb-row{ display:grid; grid-template-columns:30px 1fr; gap:12px; align-items:center; padding:9px 0; border-top:1px solid var(--hs-line); }
.hs-lb-row:first-child{ border-top:0; }
.hs-rank{ width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:13px; color:#fff; background:#c3c8d4; }
.hs-rank.r1{ background:linear-gradient(135deg,#f6c650,#e0a020); }
.hs-rank.r2{ background:linear-gradient(135deg,#cfd4de,#a7aebc); }
.hs-rank.r3{ background:linear-gradient(135deg,#e0a878,#c07d45); }
.hs-lb-main{ min-width:0; }
.hs-lb-top{ display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
.hs-lb-name{ font-weight:700; font-size:14px; }
.hs-lb-n{ font-size:11.5px; color:var(--muted,#999); }
.hs-lb-score{ margin-left:auto; font-weight:800; font-size:15px; font-variant-numeric:tabular-nums; }
.hs-track{ height:15px; border-radius:8px; background:var(--hs-track); overflow:hidden; position:relative; }
.hs-fill{ height:100%; border-radius:8px; width:0; transition:width .6s cubic-bezier(.22,.61,.36,1);
  display:flex; align-items:center; }
.hs-subs{ display:flex; gap:14px; margin-top:5px; font-size:11px; color:var(--muted,#888); }
.hs-subs b{ color:#3a4150; font-weight:700; }
.hs-scale{ display:flex; justify-content:space-between; font-size:10px; color:#c0c5d0; margin-top:8px; padding-top:4px; }
.hs-empty{ color:var(--muted,#999); font-size:13px; padding:8px 0; }
@media(max-width:640px){ .hs-bar,.hs-bar.self{ width:24px; } .hs-stats{ margin-left:0; } }
</style>
</head>
<body>
<main>
  <header class="bar">
    <h1 data-i18n="page.stats">📊 Stats</h1>
    <div class="user-chip">
      <span class="lb-countdown" id="lb-countdown" hidden></span>
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link" data-i18n="chip.logout">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link" data-i18n="nav.back">← Back</a>
    <span class="nav-stat muted small">每天更新 · daily</span>
  </nav>

  <div class="hs-wrap">
    <!-- SCORE DISTRIBUTION -->
    <section class="hs-card">
      <div class="hs-h">
        <h2>📈 打分分布</h2><span class="hs-sub">Score distribution · 全员 vs 自己</span>
      </div>
      <div class="hs-legend">
        <span><i class="hs-sw-all"></i>全员</span>
        <span><i class="hs-sw-self"></i>自己</span>
        <span class="hs-sub" style="margin-left:auto">柱高 = 组内占比 %</span>
      </div>
      <div id="hs-corr"></div>
      <div id="hs-dist"><div class="hs-empty">加载中…</div></div>
    </section>

    <!-- MODEL LEADERBOARD -->
    <section class="hs-card">
      <div class="hs-h">
        <h2>🏁 Model 均分榜</h2><span class="hs-sub">按整体均分 (PA+IA)/2 降序 · 满分 5</span>
      </div>
      <div id="hs-lb"><div class="hs-empty">加载中…</div></div>
    </section>

    <section id="hs-err" class="hs-card" style="display:none;border-color:#f2c0c8;background:#fdf3f5">
      <div class="hs-h"><h2 style="color:#b00020">加载失败</h2></div>
      <p id="hs-err-msg" class="hs-sub"></p>
    </section>
  </div>
</main>
<script src="app.js?v=v85cd" defer></script>
<script>
(function(){
  var API = window.__APPS_SCRIPT_URL__;
  var USER = "";
  try{ USER = localStorage.getItem("ewj_annotator") || ""; }catch(e){}

  // score value -> color (1 red .. 5 green), for x-axis chips + leaderboard fill
  function scoreColor(v){
    var stops=[[229,72,77],[240,138,52],[240,180,40],[120,170,70],[46,139,87]];
    var t=Math.max(1,Math.min(5,v)), i=Math.floor(t)-1, f=t-Math.floor(t);
    if(i>=4){i=3;f=1;}
    var a=stops[i], b=stops[i+1];
    var c=a.map(function(x,k){return Math.round(x+(b[k]-x)*f);});
    return "rgb("+c[0]+","+c[1]+","+c[2]+")";
  }
  function pct(arr){ var s=arr.reduce(function(a,b){return a+b;},0)||1; return arr.map(function(c){return c/s*100;}); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
  function fmt(x){ return (x==null)?"—":(Math.round(x*100)/100).toFixed(2); }

  // one metric block (PA or IA): grouped bars all vs self, 1-5
  function metricBlock(name, full, all, mine){
    var aC = all[name], mC = mine ? mine[name] : null;
    var aP = pct(aC), mP = mC ? pct(mC) : null;
    var maxP = Math.max.apply(null, aP.concat(mP||[0]).concat([1]));
    var scale = maxP>0 ? 92/maxP : 0;   // tallest bar ~92% of chart height
    var aMean = all[name+"_mean"], aStd = all[name+"_std"], aN = all.n;
    var full2 = full;
    var h = '<div class="hs-metric"><div class="hs-mrow">';
    h += '<span class="hs-mname">'+name.toUpperCase()+'</span><span class="hs-mfull">'+full2+'</span>';
    h += '<span class="hs-stats">';
    h += '<span class="hs-pill all"><span class="hs-dot"></span>全员 μ<b>'+fmt(aMean)+'</b> σ<b>'+fmt(aStd)+'</b><span class="hs-n">n='+aN+'</span></span>';
    if(mC) h += '<span class="hs-pill self"><span class="hs-dot"></span>自己 μ<b>'+fmt(mine[name+"_mean"])+'</b> σ<b>'+fmt(mine[name+"_std"])+'</b><span class="hs-n">n='+mine.n+'</span></span>';
    h += '</span></div>';
    // chart — gridlines aligned to the same 92%-of-height scale the bars use
    h += '<div class="hs-chart"><div class="hs-grid">';
    [1,.75,.5,.25].forEach(function(fr){
      var val = maxP*fr;
      var top = 100 - fr*92;   // bar of value maxP reaches 92% height
      h += '<div class="hs-gl" style="top:'+top+'%"><span>'+Math.round(val)+'%</span></div>';
    });
    h += '</div><div class="hs-bars">';
    for(var i=0;i<5;i++){
      h += '<div class="hs-grp">';
      h += '<div class="hs-bar all" style="height:'+(aP[i]*scale)+'%">'
         + '<span class="hs-lab">'+Math.round(aP[i])+'%</span>'
         + (aC[i]?'<span class="hs-cnt">'+aC[i]+'</span>':'')+'</div>';
      if(mP){
        h += '<div class="hs-bar self" style="height:'+(mP[i]*scale)+'%">'
           + '<span class="hs-lab">'+Math.round(mP[i])+'%</span>'
           + (mC[i]?'<span class="hs-cnt">'+mC[i]+'</span>':'')+'</div>';
      }
      h += '</div>';
    }
    h += '</div><div class="hs-xaxis">';
    for(var s=1;s<=5;s++){
      h += '<div class="hs-xt"><span class="hs-chip" style="background:'+scoreColor(s)+'">'+s+'</span></div>';
    }
    h += '</div></div>';
    h += '<div class="hs-axis-cap">分值 1（差）→ 5（好）</div>';
    h += '</div>';
    return h;
  }

  function corrWord(r){
    if(r==null) return "";
    var a=Math.abs(r), s=a<.2?"几乎无":a<.4?"弱":a<.6?"中等":a<.8?"强":"很强";
    return (r<0?"负·":"")+s+"相关";
  }
  // KDE colormap: t in [0,1] -> rgba (transparent low -> deep indigo high)
  function heatColor(t){
    t=Math.max(0,Math.min(1,t));
    var st=[[255,255,255,0],[214,228,250,0.55],[135,178,240,0.82],[52,104,220,0.92],[26,36,104,0.96]];
    var seg=t*(st.length-1), i=Math.floor(seg), f=seg-i;
    if(i>=st.length-1){ i=st.length-2; f=1; }
    var a=st[i], b=st[i+1];
    return [Math.round(a[0]+(b[0]-a[0])*f), Math.round(a[1]+(b[1]-a[1])*f),
            Math.round(a[2]+(b[2]-a[2])*f), a[3]+(b[3]-a[3])*f];
  }
  // one correlation panel: 2D KERNEL-DENSITY heatmap (x=PA, y=IA) + trend line + Pearson r.
  // Canvas: KDE computed on a small offscreen grid then upscaled (smoothing) => smooth gradient.
  function scatterPanel(name, cls, grp){
    var joint=(grp&&grp.joint)||null, r=grp?grp.pa_ia_corr:null, total=0;
    if(joint) for(var i=0;i<5;i++)for(var j=0;j<5;j++) total+=joint[i][j];
    var h='<div class="hs-sc"><div class="hs-sc-top">';
    h+='<span class="hs-sc-name '+cls+'"><span class="hs-dot"></span>'+name+' <span style="font-weight:500;color:#999">n='+total+'</span></span>';
    h+='<span class="hs-sc-r">r <b style="color:'+(r==null?"#999":scoreColor(1+Math.abs(r)*4))+'">'+(r==null?"—":r.toFixed(2))+'</b> '+corrWord(r)+'</span>';
    h+='</div><canvas class="hs-heat" width="560" height="500" data-joint=\''+JSON.stringify(joint||[])+'\'></canvas></div>';
    return h;
  }
  function drawHeat(cv){
    var joint; try{ joint=JSON.parse(cv.getAttribute("data-joint")); }catch(e){ joint=null; }
    var ctx=cv.getContext("2d"); var W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H);
    var pL=64,pR=24,pT=22,pB=54, plotW=W-pL-pR, plotH=H-pT-pB;
    function X(v){ return pL+(v-1)/4*plotW; }
    function Y(v){ return pT+(5-v)/4*plotH; }
    var total=0,mx=0; if(joint) for(var i=0;i<5;i++)for(var j=0;j<5;j++){ total+=joint[i][j]; }
    // KDE on offscreen grid
    if(joint && total>0){
      var GW=64, GH=57, sig=0.52, off=document.createElement("canvas"); off.width=GW; off.height=GH;
      var octx=off.getContext("2d"), img=octx.createImageData(GW,GH), dmax=0, dens=[];
      for(var gy=0; gy<GH; gy++){ var iaV=5-gy/(GH-1)*4; for(var gx=0; gx<GW; gx++){ var paV=1+gx/(GW-1)*4, s=0;
        for(var a=0;a<5;a++)for(var b=0;b<5;b++){ var c=joint[a][b]; if(!c)continue; var dx=paV-(a+1),dy=iaV-(b+1); s+=c*Math.exp(-(dx*dx+dy*dy)/(2*sig*sig)); }
        dens.push(s); if(s>dmax)dmax=s; } }
      for(var k=0;k<dens.length;k++){ var col=heatColor(dmax>0?dens[k]/dmax:0), o=k*4;
        img.data[o]=col[0]; img.data[o+1]=col[1]; img.data[o+2]=col[2]; img.data[o+3]=Math.round(col[3]*255); }
      octx.putImageData(img,0,0);
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality="high";
      ctx.drawImage(off, pL,pT, plotW,plotH);
    }
    // gridlines + ticks
    ctx.strokeStyle="rgba(150,160,180,0.28)"; ctx.lineWidth=1; ctx.font="20px -apple-system,sans-serif";
    ctx.fillStyle="#9aa0ad"; ctx.textAlign="center"; ctx.textBaseline="middle";
    for(var g=1; g<=5; g++){
      ctx.beginPath(); ctx.moveTo(X(g),pT); ctx.lineTo(X(g),pT+plotH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pL,Y(g)); ctx.lineTo(pL+plotW,Y(g)); ctx.stroke();
      ctx.fillText(g, X(g), pT+plotH+18);
      ctx.textAlign="right"; ctx.fillText(g, pL-14, Y(g)); ctx.textAlign="center";
    }
    // axis titles
    ctx.fillStyle="#6b7280"; ctx.font="600 21px -apple-system,sans-serif";
    ctx.fillText("PA 物理真实性 →", pL+plotW/2, H-16);
    ctx.save(); ctx.translate(20, pT+plotH/2); ctx.rotate(-Math.PI/2); ctx.fillText("IA 指令符合度 →",0,0); ctx.restore();
    // trend line (least squares from joint)
    if(joint && total>=2){
      var sx=0,sy=0,sxy=0,sxx=0; for(var a2=0;a2<5;a2++)for(var b2=0;b2<5;b2++){ var c2=joint[a2][b2]; if(!c2)continue;
        sx+=c2*(a2+1); sy+=c2*(b2+1); sxy+=c2*(a2+1)*(b2+1); sxx+=c2*(a2+1)*(a2+1); }
      var den=total*sxx-sx*sx;
      if(den!==0){ var m=(total*sxy-sx*sy)/den, q=(sy-m*sx)/total;
        var y1=Math.max(1,Math.min(5,q+m*1)), y2=Math.max(1,Math.min(5,q+m*5));
        ctx.strokeStyle="rgba(20,30,90,0.8)"; ctx.lineWidth=3; ctx.setLineDash([10,7]); ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(X(1),Y(y1)); ctx.lineTo(X(5),Y(y2)); ctx.stroke(); ctx.setLineDash([]); }
    }
  }
  function renderCorr(d){
    var box=document.getElementById("hs-corr");
    if(!box) return;
    var h='<div class="hs-corr-h">PA ↔ IA 核密度热力图（颜色越深=该(物理,指令)分数区标注越密集，虚线=拟合趋势，右上角 Pearson r）</div><div class="hs-scwrap">';
    h+=scatterPanel("全员","all",d.all);
    if(d.mine) h+=scatterPanel("自己","self",d.mine);
    h+='</div>';
    box.innerHTML=h;
    box.querySelectorAll("canvas.hs-heat").forEach(drawHeat);
  }
  function renderDist(d){
    var box=document.getElementById("hs-dist");
    if(!d || !d.all){ box.innerHTML='<div class="hs-empty">暂无数据</div>'; return; }
    renderCorr(d);
    var html = metricBlock("pa","Physical Adherence 物理真实性", d.all, d.mine)
             + metricBlock("ia","Instruction Alignment 指令符合度", d.all, d.mine);
    box.innerHTML = html;
  }

  function renderLB(d){
    var box=document.getElementById("hs-lb");
    var models=(d&&d.models)||[];
    if(!models.length){ box.innerHTML='<div class="hs-empty">暂无数据</div>'; return; }
    var html="";
    models.forEach(function(m,idx){
      var ov=m.overall_mean||0;
      var rk=idx+1, rcls = rk<=3?(" r"+rk):"";
      var col=scoreColor(ov);
      html += '<div class="hs-lb-row">';
      html += '<div class="hs-rank'+rcls+'">'+rk+'</div>';
      html += '<div class="hs-lb-main"><div class="hs-lb-top">';
      html += '<span class="hs-lb-name">'+esc(m.model)+'</span><span class="hs-lb-n">n='+m.n_annotations+'</span>';
      html += '<span class="hs-lb-score" style="color:'+col+'">'+fmt(ov)+'</span></div>';
      html += '<div class="hs-track"><div class="hs-fill" data-w="'+(ov/5*100)+'" style="background:linear-gradient(90deg,'+col+'cc,'+col+')"></div></div>';
      html += '<div class="hs-subs"><span>PA <b>'+fmt(m.pa_mean)+'</b></span><span>IA <b>'+fmt(m.ia_mean)+'</b></span></div>';
      html += '</div></div>';
    });
    html += '<div class="hs-scale"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>';
    box.innerHTML = html;
    // animate fills
    requestAnimationFrame(function(){
      box.querySelectorAll(".hs-fill").forEach(function(el){ el.style.width=el.getAttribute("data-w")+"%"; });
    });
  }

  function showErr(msg){
    var e=document.getElementById("hs-err"); e.style.display="block";
    document.getElementById("hs-err-msg").textContent=msg;
  }
  function jget(action, extra){
    return fetch(API+"/?action="+action+(extra||""),{cache:"no-store"}).then(function(r){
      if(!r.ok && r.status!==403) throw new Error(action+" HTTP "+r.status);
      return r.json();
    });
  }
  function load(){
    if(!API){ showErr("后端地址未配置"); return; }
    jget("score_distribution","&user="+encodeURIComponent(USER)).then(renderDist)
      .catch(function(e){ document.getElementById("hs-dist").innerHTML='<div class="hs-empty">分布加载失败</div>'; showErr(String(e)); });
    jget("model_averages","&user="+encodeURIComponent(USER)).then(function(d){
      if(d && d.error){ document.getElementById("hs-lb").innerHTML='<div class="hs-empty">'+esc(d.error)+'</div>'; return; }
      renderLB(d);
    }).catch(function(e){ document.getElementById("hs-lb").innerHTML='<div class="hs-empty">均分榜加载失败</div>'; });
  }
  if(document.readyState!=="loading") load(); else document.addEventListener("DOMContentLoaded", load);
  setInterval(load, 60000);
})();
</script>
</body>
</html>
