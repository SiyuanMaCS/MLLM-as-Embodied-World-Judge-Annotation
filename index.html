<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embodied World Judge — Annotate</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v79">
</head>
<body class="landing">
<main class="landing-main">
  <header class="landing-hero">
    <h1 class="landing-title">Embodied World Judge</h1>
    <p class="landing-tagline">Score AI-generated robot videos · help build the benchmark</p>
  </header>

  <section class="card landing-card landing-register">
    <form id="login-form">
      <label for="username">Your handle</label>
      <input type="text" id="username" name="username" required minlength="2" maxlength="32"
             pattern="[A-Za-z0-9_\-]+" placeholder="e.g. alice_w"
             autocomplete="off">
      <small>2–32 chars · letters / digits / _ / -</small>
      <button type="submit" class="landing-cta">开始标注 →</button>
    </form>
    <p id="login-msg" class="msg"></p>
  </section>

  <section id="public-progress" class="card landing-card" hidden>
    <div class="landing-stats">
      <div class="landing-stat">
        <span class="landing-stat-icon">👥</span>
        <span class="landing-stat-num" id="pub-annotators">—</span>
        <span class="landing-stat-label">Annotators</span>
      </div>
      <div class="landing-stat">
        <span class="landing-stat-icon">📅</span>
        <span class="landing-stat-num" id="pub-today">—</span>
        <span class="landing-stat-label">Today</span>
      </div>
      <div class="landing-stat">
        <span class="landing-stat-icon">✅</span>
        <span class="landing-stat-num" id="pub-total">—</span>
        <span class="landing-stat-label">Total annotations</span>
      </div>
    </div>
    <div class="landing-progress-block">
      <div class="landing-progress-head">
        <span class="landing-progress-label">总体进度 · 21 天目标 5000</span>
        <span class="landing-progress-num"><strong id="pub-done">0</strong> <span class="muted">/ 5000</span> <span class="landing-progress-pct" id="pub-pct">(0%)</span></span>
      </div>
      <div class="landing-progress-bar">
        <div class="landing-progress-fill" id="pub-fill" style="width:0%"></div>
        <span class="landing-tick" style="left:25%"></span>
        <span class="landing-tick" style="left:50%"></span>
        <span class="landing-tick" style="left:75%"></span>
      </div>
    </div>
  </section>
</main>

<script src="app.js?v=v79" defer></script>
</body>
</html>
