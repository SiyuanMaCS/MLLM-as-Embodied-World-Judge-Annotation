<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v85ey">
<style>
  .lb-section { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .lb-section h2 { margin: 0 0 10px; font-size: 15px; letter-spacing: -0.01em; font-weight: 600; color: #0f172a; }
  .lb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .lb-table th, .lb-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
  .lb-table th { font-weight: 500; color: #94a3b8; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; padding-top: 0; padding-bottom: 6px; }
  .lb-table tbody tr:hover { background: #f8fafc; }
  .lb-table tbody tr:last-child td { border-bottom: none; }
  .lb-rank { width: 28px; color: #cbd5e1; font-weight: 600; text-align: center; font-variant-numeric: tabular-nums; }
  .lb-model { font-weight: 600; color: #0f172a; }
  .lb-num { font-variant-numeric: tabular-nums; text-align: right; }
  .lb-bar { display: inline-block; position: relative; width: 90px; height: 14px; background: #f1f5f9; border-radius: 4px; overflow: hidden; margin-right: 8px; vertical-align: middle; }
  .lb-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, #60a5fa, #2563eb); border-radius: 4px 0 0 4px; }
  .lb-bar-fill.vg { background: linear-gradient(90deg, #34d399, #10b981); }
  .lb-partial-tag { display: inline-block; padding: 1px 6px; margin-left: 6px; background: #fef3c7; border: 1px solid #fde68a; color: #92400e; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.4px; }
  .lb-loading { color: #94a3b8; padding: 6px 0; font-size: 13px; }
  @media (max-width: 640px) {
    .lb-section { padding: 12px; }
    .lb-table { font-size: 12px; }
    .lb-table th, .lb-table td { padding: 6px; }
    .lb-bar { width: 55px; height: 12px; }
    .lb-hide-mobile { display: none; }
  }
</style>
</head>
<body>
<main>
  <header class="bar">
    <h1 data-i18n="page.leaderboard">🏆 Leaderboard</h1>
    <div class="user-chip">
      <span class="lb-countdown" id="lb-countdown" hidden></span>
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link" data-i18n="chip.logout">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link" data-i18n="nav.back">← Back</a>
  </nav>

  <section class="lb-section">
    <h2 data-i18n="leaderboard.judge_title">🧑‍⚖️ Judge model · 875</h2>
    <div id="judge-loading" class="lb-loading" data-i18n="common.loading">Loading…</div>
    <div id="judge-table-wrap" hidden>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="lb-rank">#</th>
            <th data-i18n="leaderboard.col.model">Model</th>
            <th class="lb-num">n</th>
            <th class="lb-num">PA·Pearson</th>
            <th class="lb-num">IA·Pearson</th>
            <th class="lb-num lb-hide-mobile">Joint-F1</th>
            <th class="lb-num lb-hide-mobile">Exact PA</th>
            <th class="lb-num lb-hide-mobile">±1 PA</th>
          </tr>
        </thead>
        <tbody id="judge-tbody"></tbody>
      </table>
    </div>
  </section>

  <section class="lb-section">
    <h2 data-i18n="leaderboard.videogen_title">🎬 Video-gen model</h2>
    <div id="vg-loading" class="lb-loading" data-i18n="common.loading">Loading…</div>
    <div id="vg-table-wrap" hidden>
      <table class="lb-table">
        <thead>
          <tr>
            <th class="lb-rank">#</th>
            <th data-i18n="leaderboard.col.model">Model</th>
            <th class="lb-num">n</th>
            <th class="lb-num">PA</th>
            <th class="lb-num">IA</th>
            <th class="lb-num" data-i18n="leaderboard.col.overall">Overall</th>
          </tr>
        </thead>
        <tbody id="vg-tbody"></tbody>
      </table>
    </div>
  </section>
</main>
<script src="app.js?v=v85ey"></script>
<script>
  async function loadJudge() {
    try {
      // v85ew: mllm_judge repo is private, so raw.githubusercontent.com 404s
      // for public visitors. Route the primary fetch through the HF mirror
      // instead — HF is public, GHA sync keeps it byte-identical with GitHub.
      const primary = 'https://huggingface.co/datasets/HuggingFriends/mllm-as-embodied-world-judge/resolve/main/bench/results/leaderboard.md';
      const fallback = 'bench/leaderboard.md?v=v85ey';
      let md;
      try { md = await fetch(primary).then(r => { if (!r.ok) throw new Error('primary ' + r.status); return r.text(); }); }
      catch (_) { md = await fetch(fallback).then(r => r.text()); }
      const rows = md.split('\n')
        .filter(l => l.startsWith('|') && !l.match(/^\|\s*(-|Model|-{2,})/))
        .map(l => l.split('|').map(c => c.trim()).filter(c => c !== ''))
        .filter(r => r.length >= 6 && !r[0].startsWith('---'));
      const parsed = rows.map(r => {
        const raw = r[0];
        const partial = raw.endsWith('*');
        return { model: raw.replace(/\s*\*$/, '').trim(), n: parseInt(r[1].replace(/,/g, ''), 10),
                 pa: parseFloat(r[3]), ia: parseFloat(r[4]), jf1: parseFloat(r[5]),
                 exact: parseFloat(r[6]), plus1: parseFloat(r[7]), partial };
      });
      parsed.sort((a, b) => (b.pa || -9) - (a.pa || -9));
      const tbody = document.getElementById('judge-tbody');
      tbody.innerHTML = parsed.map((m, i) => `
        <tr>
          <td class="lb-rank">${i + 1}</td>
          <td class="lb-model">${escapeHtml(m.model)}${m.partial ? '<span class="lb-partial-tag">partial</span>' : ''}</td>
          <td class="lb-num">${m.n}</td>
          <td class="lb-num"><span class="lb-bar"><span class="lb-bar-fill" style="width:${Math.max(0, m.pa) * 100}%"></span></span>${m.pa.toFixed(3)}</td>
          <td class="lb-num"><span class="lb-bar"><span class="lb-bar-fill" style="width:${Math.max(0, m.ia) * 100}%"></span></span>${m.ia.toFixed(3)}</td>
          <td class="lb-num lb-hide-mobile">${m.jf1.toFixed(3)}</td>
          <td class="lb-num lb-hide-mobile">${m.exact.toFixed(3)}</td>
          <td class="lb-num lb-hide-mobile">${m.plus1.toFixed(3)}</td>
        </tr>
      `).join('');
      document.getElementById('judge-loading').hidden = true;
      document.getElementById('judge-table-wrap').hidden = false;
    } catch (e) {
      document.getElementById('judge-loading').textContent = e.message;
    }
  }
  async function loadVideogen() {
    try {
      // v85ew: same private-repo reroute — pull the merged videogen json from
      // the HF mirror instead of raw.githubusercontent (which 404s for a
      // private source). Client merge regex is still an idempotent safety net.
      const vgPrimary = 'https://huggingface.co/datasets/HuggingFriends/mllm-as-embodied-world-judge/resolve/main/bench/videogen_leaderboard.json';
      const vgFallback = 'bench/videogen_leaderboard.json?v=v85ey';
      let data;
      try { data = await fetch(vgPrimary).then(r => { if (!r.ok) throw new Error('primary ' + r.status); return r.json(); }); }
      catch (_) { data = await fetch(vgFallback).then(r => r.json()); }
      // v85es (siyuan: 这里不要区分 rewrite 和 prefix): collapse variants into
      // their base model, weighting PA / IA / overall by n.
      const byBase = new Map();
      for (const m of data) {
        const base = String(m.model || '').replace(/_(rewrite|prefix)$/, '');
        const cur = byBase.get(base) || { model: base, n: 0, paSum: 0, iaSum: 0 };
        cur.n += m.n; cur.paSum += m.pa * m.n; cur.iaSum += m.ia * m.n;
        byBase.set(base, cur);
      }
      const merged = Array.from(byBase.values()).map(x => {
        const pa = x.n ? x.paSum / x.n : 0;
        const ia = x.n ? x.iaSum / x.n : 0;
        return { model: x.model, n: x.n, pa, ia, overall: (pa + ia) / 2 };
      });
      const sorted = merged.sort((a, b) => (b.overall || 0) - (a.overall || 0));
      const tbody = document.getElementById('vg-tbody');
      tbody.innerHTML = sorted.map((m, i) => `
        <tr>
          <td class="lb-rank">${i + 1}</td>
          <td class="lb-model">${escapeHtml(m.model)}</td>
          <td class="lb-num">${m.n}</td>
          <td class="lb-num"><span class="lb-bar"><span class="lb-bar-fill vg" style="width:${(m.pa / 5) * 100}%"></span></span>${m.pa.toFixed(2)}</td>
          <td class="lb-num"><span class="lb-bar"><span class="lb-bar-fill vg" style="width:${(m.ia / 5) * 100}%"></span></span>${m.ia.toFixed(2)}</td>
          <td class="lb-num"><strong>${m.overall.toFixed(2)}</strong></td>
        </tr>
      `).join('');
      document.getElementById('vg-loading').hidden = true;
      document.getElementById('vg-table-wrap').hidden = false;
    } catch (e) {
      document.getElementById('vg-loading').textContent = e.message;
    }
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }
  loadJudge();
  loadVideogen();
</script>
</body>
</html>
