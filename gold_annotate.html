<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Annotation — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v22">
</head>
<body>
<main>
  <header class="bar">
    <h1>Gold annotation</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link">← Back</a>
  </nav>

  <section id="loading" class="card"><p>Loading next gold item…</p></section>

  <section id="item" class="card" hidden>
    <div class="meta"><span class="tag gold-tag">GOLD</span><span class="tag" id="meta-dataset">—</span><span class="tag" id="meta-task">—</span></div>
    <div class="video-row">
      <figure><figcaption>Generated</figcaption><video id="gen-video" controls preload="metadata" muted playsinline></video></figure>
      <figure id="gt-fig" hidden><figcaption>Ground truth</figcaption><video id="gt-video" controls preload="metadata" muted playsinline></video></figure>
    </div>
    <div class="prompt-box"><label>Task instruction</label><p id="prompt-text">—</p></div>
    <form id="annotate-form">
      <h3>Gold annotation</h3>
      <div class="form-row"><label for="quality">Quality (1–5) <output for="quality" id="quality-out">3</output></label><input type="range" id="quality" name="quality" min="1" max="5" step="1" value="3"></div>
      <div class="form-row"><label for="faithful">Faithfulness (1–5) <output for="faithful" id="faithful-out">3</output></label><input type="range" id="faithful" name="faithful" min="1" max="5" step="1" value="3"></div>
      <div class="form-row"><label for="notes">Notes (optional)</label><textarea id="notes" name="notes" rows="3" maxlength="500"></textarea></div>
      <div class="form-row actions"><button type="submit">Save &amp; next →</button><button type="button" id="skip-btn" class="ghost">Skip</button></div>
    </form>
  </section>

  <section id="error" class="card error" hidden><h3>Notice</h3><p id="error-msg">—</p><button id="retry-btn">Retry</button></section>
</main>
<script src="app.js" defer></script>
</body>
</html>
