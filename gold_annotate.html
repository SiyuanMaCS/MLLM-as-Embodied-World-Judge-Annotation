<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Annotation — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v69">
</head>
<body>
<main>
  <header class="bar">
    <h1 data-i18n="page.gold_annotate">Gold annotation</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link" data-i18n="chip.logout">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link" data-i18n="nav.back">← Back</a>
  </nav>

  <section id="loading" class="card"><p data-i18n="gold.loading_next">Loading next gold item…</p></section>

  <section id="item" class="card" hidden>
    <div class="meta"><span class="tag gold-tag">GOLD</span><span class="tag" id="meta-dataset">—</span><span class="tag" id="meta-task">—</span></div>
    <div class="video-row">
      <figure><figcaption>Generated</figcaption><video id="gen-video" controls preload="metadata" muted playsinline webkit-playsinline="true" x5-playsinline="true"></video></figure>
      <figure id="gt-fig" hidden><figcaption>Ground truth</figcaption><video id="gt-video" controls preload="metadata" muted playsinline webkit-playsinline="true" x5-playsinline="true"></video></figure>
    </div>
    <div class="prompt-box"><label data-i18n="task.instruction">Task instruction</label><p id="prompt-text">—</p></div>
    <form id="annotate-form">
      <fieldset class="dim-block">
        <legend class="dim-block-title">Physical Adherence <span class="dim-help">物理真实度 · only judge what you see in the video</span></legend>
        <div class="form-row">
          <label for="physical_adherence">Score (1–5) <output for="physical_adherence" id="physical_adherence-out">3</output></label>
          <input type="range" id="physical_adherence" name="physical_adherence" min="1" max="5" step="1" value="3">
          <p class="score-hint level-3" id="physical_adherence-hint">—</p>
        </div>
        <div class="sub-row">
          <label class="sub-check"><input type="checkbox" id="agent_consistency" name="agent_consistency"> <span>Agent consistency</span><small>机械手/人手结构完整、不融化/扭曲</small></label>
          <label class="sub-check"><input type="checkbox" id="scene_consistency" name="scene_consistency"> <span>Scene & object consistency</span><small>背景与物体时序一致、不闪烁/瞬移/形变</small></label>
          <label class="sub-check"><input type="checkbox" id="interaction_realism" name="interaction_realism"> <span>Interaction realism</span><small>抓取真实闭合、无穿模、遵守重力惯性</small></label>
        </div>
        <div class="form-row">
          <label for="physical_notes"><span data-i18n="task.physical_notes">Physical evidence</span> <span class="required-tag">*</span></label>
          <textarea id="physical_notes" rows="2" maxlength="500" placeholder="Required — visual evidence for the physical score"></textarea>
        </div>
      </fieldset>

      <fieldset class="dim-block">
        <legend class="dim-block-title">Instruction Alignment <span class="dim-help">指令对齐 · judge with task instruction + init frame</span></legend>
        <div class="form-row">
          <label for="instruction_alignment">Score (1–5) <output for="instruction_alignment" id="instruction_alignment-out">3</output></label>
          <input type="range" id="instruction_alignment" name="instruction_alignment" min="1" max="5" step="1" value="3">
          <p class="score-hint level-3" id="instruction_alignment-hint">—</p>
        </div>
        <div class="sub-row">
          <label class="sub-check"><input type="checkbox" id="agent_match" name="agent_match"> <span>Agent match</span><small>完成任务的就是首帧那个机械手/人手</small></label>
          <label class="sub-check"><input type="checkbox" id="object_correct" name="object_correct"> <span>Object correct</span><small>操纵的 object 是指令指定的</small></label>
          <label class="sub-check"><input type="checkbox" id="goal_completed" name="goal_completed"> <span>Goal completed</span><small>指令的目标已完整达成</small></label>
        </div>
        <div class="form-row">
          <label for="instruction_notes"><span data-i18n="task.instruction_notes">Instruction-alignment evidence</span> <span class="required-tag">*</span></label>
          <textarea id="instruction_notes" rows="2" maxlength="500" placeholder="Required — visual evidence for the instruction score"></textarea>
        </div>
      </fieldset>
      <div class="form-row actions">
        <button type="submit" data-i18n="task.save_next">Save &amp; next →</button>
        <button type="button" id="skip-btn" class="ghost" data-i18n="task.skip">Skip</button>
      </div>
    </form>
  </section>

  <section id="error" class="card error" hidden><h3 data-i18n="common.notice">Notice</h3><p id="error-msg">—</p><button id="retry-btn" data-i18n="common.retry">Retry</button></section>
</main>
<script src="app.js?v=v69" defer></script>
</body>
</html>
