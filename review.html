<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Queue — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v71">
</head>
<body>
<main>
  <header class="bar">
    <h1 data-i18n="page.review">Review queue</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link" data-i18n="chip.logout">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link" data-i18n="nav.back">← Back</a>
  </nav>

  <section id="loading" class="card"><p data-i18n="review.loading_next">Loading next review task…</p></section>

  <section id="item" class="card" hidden>
    <div class="meta">
      <span class="tag" id="meta-kind">DAILY</span>
      <span class="tag" id="meta-dataset">—</span>
      <span class="tag" id="meta-task">—</span>
      <span class="tag" id="meta-self-report" hidden>⚠ SELF-REPORTED</span>
    </div>

    <div class="video-row">
      <figure><figcaption>Generated</figcaption><video id="gen-video" controls preload="metadata" muted playsinline webkit-playsinline="true" x5-playsinline="true"></video></figure>
    </div>
    <div class="prompt-box"><label data-i18n="task.instruction">Task instruction</label><p id="prompt-text">—</p></div>

    <div class="prompt-box">
      <label data-i18n="review.annotator_submission">Annotator submission (annotator hidden)</label>
      <p>Physical: <strong id="orig-physical_adherence">—</strong> · Instruction: <strong id="orig-instruction_alignment">—</strong></p>
      <p class="muted small">P-subs: <span id="orig-psubs">—</span> · I-subs: <span id="orig-isubs">—</span></p>
      <p>Notes: <em id="orig-notes">—</em></p>
    </div>

    <form id="review-form">
      <h3 data-i18n="review.your_decision">Your decision</h3>
      <div id="modify-fields" hidden>
        <fieldset class="dim-block">
          <legend class="dim-block-title" data-i18n="axis.physical">Physical Adherence</legend>
          <div class="form-row">
            <label for="m-physical_adherence">Score (1–5) <output for="m-physical_adherence" id="m-physical_adherence-out">3</output></label>
            <input type="range" id="m-physical_adherence" min="1" max="5" step="1" value="3">
            <p class="score-hint level-3" id="m-physical_adherence-hint">—</p>
          </div>
          <div class="sub-row">
            <label class="sub-check"><input type="checkbox" id="m-agent_consistency"> <span>Agent consistency</span></label>
            <label class="sub-check"><input type="checkbox" id="m-scene_consistency"> <span>Scene & object consistency</span></label>
            <label class="sub-check"><input type="checkbox" id="m-interaction_realism"> <span>Interaction realism</span></label>
          </div>
          <div class="form-row">
            <label for="m-physical_notes"><span data-i18n="task.physical_notes">Physical evidence</span> <span class="required-tag">*</span></label>
            <textarea id="m-physical_notes" rows="2" maxlength="500" placeholder="Required — why you changed the physical score"></textarea>
          </div>
        </fieldset>

        <fieldset class="dim-block">
          <legend class="dim-block-title" data-i18n="axis.instruction">Instruction Alignment</legend>
          <div class="form-row">
            <label for="m-instruction_alignment">Score (1–5) <output for="m-instruction_alignment" id="m-instruction_alignment-out">3</output></label>
            <input type="range" id="m-instruction_alignment" min="1" max="5" step="1" value="3">
            <p class="score-hint level-3" id="m-instruction_alignment-hint">—</p>
          </div>
          <div class="sub-row">
            <label class="sub-check"><input type="checkbox" id="m-agent_match"> <span>Agent match</span></label>
            <label class="sub-check"><input type="checkbox" id="m-object_correct"> <span>Object correct</span></label>
            <label class="sub-check"><input type="checkbox" id="m-goal_completed"> <span>Goal completed</span></label>
          </div>
          <div class="form-row">
            <label for="m-instruction_notes"><span data-i18n="task.instruction_notes">Instruction-alignment evidence</span> <span class="required-tag">*</span></label>
            <textarea id="m-instruction_notes" rows="2" maxlength="500" placeholder="Required — why you changed the instruction score"></textarea>
          </div>
        </fieldset>
      </div>
      <div class="form-row actions">
        <button type="button" id="approve-btn" data-i18n="review.approve">✅ Approve as-is</button>
        <button type="button" id="modify-btn" class="ghost" data-i18n="review.modify">✏ Modify</button>
        <button type="button" id="skip-btn" class="ghost" data-i18n="task.skip">Skip</button>
      </div>
    </form>
  </section>

  <section id="error" class="card error" hidden><h3 data-i18n="common.notice">Notice</h3><p id="error-msg">—</p><button id="retry-btn" data-i18n="common.retry">Retry</button></section>
</main>
<script src="app.js?v=v71" defer></script>
</body>
</html>
