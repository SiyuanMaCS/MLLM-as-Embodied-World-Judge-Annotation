<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reviews — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v85ap">
</head>
<body>
<main>
  <header class="bar">
    <h1 data-i18n="page.my_reviews">My reviews</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link" data-i18n="chip.logout">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link" data-i18n="nav.back">← Back</a>
  </nav>

  <section id="my-summary" class="card" hidden>
    <div class="stat-row">
      <div class="stat"><span class="stat-num" id="t-reviewed">0</span><span class="stat-label" data-i18n="my_reviews.stats.reviewed">reviewed</span></div>
      <div class="stat"><span class="stat-num" id="t-approved">0</span><span class="stat-label" data-i18n="my_reviews.stats.approved">approved</span></div>
      <div class="stat"><span class="stat-num" id="t-modified">0</span><span class="stat-label" data-i18n="my_reviews.stats.modified">modified</span></div>
      <div class="stat"><span class="stat-num" id="t-rate">—</span><span class="stat-label" data-i18n="my_reviews.stats.rate">approval rate</span></div>
    </div>
  </section>

  <section class="card">
    <h3 data-i18n="my_reviews.history">Reviewed history</h3>
    <p id="my-loading" data-i18n="common.loading">Loading…</p>
    <p id="my-empty" hidden data-i18n="my_reviews.empty">No reviews yet for you. Submit some annotations and they'll be sampled or self-reportable.</p>
    <ul id="my-list" class="my-list" hidden></ul>
  </section>

  <section id="my-error" class="card error" hidden><h3 data-i18n="common.failed">Failed</h3><p id="my-err-msg">—</p></section>
</main>
<script src="app.js?v=v85ap" defer></script>
</body>
</html>
