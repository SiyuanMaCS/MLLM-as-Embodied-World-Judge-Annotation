<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Library — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header class="bar">
    <h1>Gold library</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link">← Back</a>
  </nav>

  <section class="card">
    <form id="gl-filter" class="gl-filter">
      <fieldset class="dim-group">
        <legend class="dim-legend">Quality <span class="range-value"><span id="q-min-val">1</span> – <span id="q-max-val">5</span></span></legend>
        <div class="slider-line">
          <span class="slider-tag">min</span>
          <input type="range" id="q-min" min="1" max="5" step="1" value="1">
          <span class="slider-val" id="q-min-tail">1</span>
        </div>
        <div class="slider-line">
          <span class="slider-tag">max</span>
          <input type="range" id="q-max" min="1" max="5" step="1" value="5">
          <span class="slider-val" id="q-max-tail">5</span>
        </div>
      </fieldset>
      <fieldset class="dim-group">
        <legend class="dim-legend">Faithful <span class="range-value"><span id="f-min-val">1</span> – <span id="f-max-val">5</span></span></legend>
        <div class="slider-line">
          <span class="slider-tag">min</span>
          <input type="range" id="f-min" min="1" max="5" step="1" value="1">
          <span class="slider-val" id="f-min-tail">1</span>
        </div>
        <div class="slider-line">
          <span class="slider-tag">max</span>
          <input type="range" id="f-max" min="1" max="5" step="1" value="5">
          <span class="slider-val" id="f-max-tail">5</span>
        </div>
      </fieldset>
      <div class="filter-actions">
        <button type="submit">Search</button>
        <span class="muted" id="gl-count">—</span>
      </div>
    </form>
  </section>

  <section id="gl-loading" class="card" hidden><p>Loading…</p></section>
  <section id="gl-empty" class="card" hidden><p>No matching items.</p></section>
  <section id="gl-error" class="card error" hidden><h3>Failed</h3><p id="gl-err-msg">—</p></section>

  <div id="gl-list"></div>
</main>
<script src="app.js" defer></script>
</body>
</html>
