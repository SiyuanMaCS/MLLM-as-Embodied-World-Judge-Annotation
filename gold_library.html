<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Library — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=v85dw">
</head>
<body>
<main>
  <header class="bar">
    <h1 data-i18n="page.gold_library">Gold library</h1>
    <div class="user-chip">
      <span class="lb-countdown" id="lb-countdown" hidden></span>
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link" data-i18n="chip.logout">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html" class="back-link" data-i18n="nav.back">← Back</a>
  </nav>

  <section class="card filter-card">
    <form id="gl-filter">
      <div class="dim-row">
        <span class="dim-label" data-i18n="axis.physical">Physical Adherence</span>
        <span class="dim-value"><b id="pa-min-val">1</b>–<b id="pa-max-val">5</b></span>
        <div class="range-dual" data-pair="pa">
          <div class="range-track"></div>
          <div class="range-fill" id="pa-fill"></div>
          <input type="range" id="pa-min" min="1" max="5" step="1" value="1" aria-label="Physical adherence min">
          <input type="range" id="pa-max" min="1" max="5" step="1" value="5" aria-label="Physical adherence max">
        </div>
      </div>
      <div class="dim-row">
        <span class="dim-label" data-i18n="axis.instruction">Instruction Alignment</span>
        <span class="dim-value"><b id="ia-min-val">1</b>–<b id="ia-max-val">5</b></span>
        <div class="range-dual" data-pair="ia">
          <div class="range-track"></div>
          <div class="range-fill" id="ia-fill"></div>
          <input type="range" id="ia-min" min="1" max="5" step="1" value="1" aria-label="Instruction alignment min">
          <input type="range" id="ia-max" min="1" max="5" step="1" value="5" aria-label="Instruction alignment max">
        </div>
      </div>
      <div class="filter-foot">
        <span class="muted" id="gl-count">—</span>
      </div>
    </form>
  </section>

  <section id="gl-loading" class="card" hidden><p data-i18n="common.loading">Loading…</p></section>
  <section id="gl-empty" class="card" hidden><p data-i18n="gold_library.no_match">No matching items.</p></section>
  <section id="gl-error" class="card error" hidden><h3 data-i18n="common.failed">Failed</h3><p id="gl-err-msg">—</p></section>

  <div id="gl-list"></div>
</main>
<script src="app.js?v=v85dw" defer></script>
</body>
</html>
