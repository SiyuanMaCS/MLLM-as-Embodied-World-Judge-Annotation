<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Library — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header class="bar">
    <h1>Gold library</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link">logout</button>
    </div>
  </header>
  <nav class="page-nav">
    <a href="dashboard.html">Home</a>
  </nav>

  <section class="card">
    <form id="gl-filter" class="gl-filter">
      <div class="filter-row">
        <span class="filter-label">Quality</span>
        <select id="q-min">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
        </select>
        <span class="filter-sep">to</span>
        <select id="q-max">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option>
        </select>
      </div>
      <div class="filter-row">
        <span class="filter-label">Faithful</span>
        <select id="f-min">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
        </select>
        <span class="filter-sep">to</span>
        <select id="f-max">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option>
        </select>
      </div>
      <div class="filter-row filter-actions">
        <button type="submit">Search</button>
        <span class="muted" id="gl-count">—</span>
      </div>
    </form>
  </section>

  <section id="gl-loading" class="card" hidden><p>Loading…</p></section>
  <section id="gl-empty" class="card" hidden><p>No matching items.</p></section>
  <section id="gl-error" class="card error" hidden><h3>Failed</h3><p id="gl-err-msg">—</p></section>

  <div id="gl-list"></div>
</main>
<script src="app.js" defer></script>
</body>
</html>
