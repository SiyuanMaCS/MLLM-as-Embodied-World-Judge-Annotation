<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Embodied World Judge</title>
<script>window.__APPS_SCRIPT_URL__ = "https://busy-ricky-handhelds-estimates.trycloudflare.com";</script>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header class="bar">
    <h1>Home</h1>
    <div class="user-chip">
      <span id="who">—</span> <span class="role-pill" id="role">—</span>
      <button id="logout-btn" class="link">logout</button>
    </div>
  </header>

  <nav class="page-nav">
    <a href="task.html" class="primary">Annotate →</a>
    <a href="my_reviews.html">My reviews</a>
    <a href="gold_library.html">Gold library</a>
    <a href="reviewer_home.html" class="reviewer-only">Reviewer hub</a>
    <a href="gold_annotate.html" class="reviewer-only">Gold annotation</a>
    <a href="review.html" class="reviewer-only">Review queue</a>
    <a href="admin_review.html" class="admin-only">Admin gold review</a>
  </nav>

  <section id="summary" class="card">
    <div class="stat-row">
      <div class="stat"><span class="stat-num" id="t-annotators">0</span><span class="stat-label">annotators</span></div>
      <div class="stat"><span class="stat-num" id="t-today">0</span><span class="stat-label">today</span></div>
      <div class="stat"><span class="stat-num" id="t-total">0</span><span class="stat-label">total annotations</span></div>
    </div>
    <p id="view-mode" class="view-mode">—</p>
  </section>

  <section class="card" id="self-summary" hidden></section>

  <section class="card">
    <p id="ann-loading">Loading…</p>
    <div id="grid-wrap" hidden>
      <table id="grid-table">
        <thead></thead>
        <tbody></tbody>
        <tfoot></tfoot>
      </table>
      <p class="legend">
        🟢 met daily quota · 🔴 below quota · ◻ no activity ·
        <strong class="ok-text">+N</strong> ahead of cumulative target ·
        <strong class="warn-text">−N</strong> behind cumulative target
      </p>
    </div>
  </section>

  <section class="card" id="met-by-day" hidden></section>

  <section id="dash-error" class="card error" hidden>
    <h3>Failed to load</h3>
    <p id="dash-err-msg">—</p>
  </section>
</main>
<script src="app.js" defer></script>
</body>
</html>
